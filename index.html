    @keyframes fadeSlideUp {

      0% { opacity: 0; transform: scale(0.9); }

                      <button 
                        onClick={() => playAudio(item.term)}
                        className="ml-4 p-4 md:p-5 mt-2 md:mt-0 rounded-full bg-slate-50 text-slate-400 hover:bg-blue-600 hover:text-white hover:shadow-lg active:scale-95 transition-all duration-200 shrink-0 border border-slate-200 hover:border-blue-600" 
                        title="한국어 발음 듣기"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 md:h-10 md:w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                      </button>
                    </div>
                  </div>
                ))
              ) : (
                <div className="text-center py-10 text-slate-400 font-medium flex flex-col items-center justify-center h-full break-keep">
                  <p>해당 부서의 학습 데이터가 아직 준비되지 않았습니다.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      , `learn_content_${activeTab}`);

      const renderQuizContent = () => {
        let content;

        if (quizState === 'idle') {
          content = (
            <div className="max-w-md w-full my-auto animate-fade-slide-up">
              <div className="bg-teal-100 text-teal-600 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner text-5xl animate-pop-in">
                {getDeptIcon(activeTab)}
              </div>
              <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-4 break-keep">
                <span className="text-teal-600 mr-2">[{activeTab}]</span>랜덤 퀴즈
              </h2>
              <p className="text-slate-500 mb-10 text-base md:text-lg leading-relaxed break-keep">
                들려주는 한국어 지시어를 듣고,<br/>
                올바른 베트남어 뜻을 골라보세요.<br/>
                <strong className="text-teal-600 mt-2 block">매번 무작위로 10문제가 출제됩니다!</strong>
              </p>
              <button onClick={startQuiz} className="w-full py-5 bg-teal-600 hover:bg-teal-700 text-white text-xl font-black rounded-2xl shadow-xl hover:shadow-2xl transition-all active:scale-95 break-keep">
                퀴즈 시작하기
              </button>
            </div>
          );
        } else if (quizState === 'playing' && quizQuestions.length > 0) {
          content = (
            <div className="max-w-2xl w-full flex flex-col flex-1 min-h-0 h-full animate-fade-slide-up">
              <div className="flex justify-between items-center mb-3 md:mb-4 shrink-0 px-2 mt-1">
                <span className="text-teal-700 font-black text-base md:text-xl tracking-tight">Question {currentQuizIndex + 1} / {quizQuestions.length}</span>
                <span className="text-slate-500 font-bold text-sm md:text-lg bg-white px-3 py-1 md:py-1.5 rounded-full shadow-sm border border-slate-200">
                  Score <span className="text-teal-600 ml-1 text-lg md:text-xl">{quizScore}</span>
                </span>
              </div>

              <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-3 md:mb-4 shrink-0 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-1.5 h-full bg-teal-500"></div>
                <p className="text-xs md:text-sm text-slate-500 font-bold mb-2 md:mb-3 leading-relaxed break-keep text-center">
                  다음 지시어를 듣고 알맞은 의미를 고르시오.
                </p>
                
                <div className="flex flex-col items-center justify-center gap-2 md:gap-3 my-1">
                  <button 
                    onClick={() => playAudio(quizQuestions[currentQuizIndex].term)}
                    className="w-12 h-12 md:w-16 md:h-16 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center hover:bg-teal-600 hover:text-white shadow-sm hover:shadow-md transition-all transform hover:scale-105 border border-teal-200"
                    title="소리 다시 듣기"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 md:h-8 md:w-8 ml-0.5 md:ml-1" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M8 5v14l11-7z" />
                    </svg>
                  </button>
                  <h3 className="text-xl md:text-3xl font-black text-slate-800 tracking-tight leading-snug break-keep text-center">
                    {quizQuestions[currentQuizIndex].term}
                  </h3>
                </div>
              </div>

              <div className="grid grid-cols-1 gap-2 md:gap-3 flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-2 pb-2">
                {quizQuestions[currentQuizIndex].options.map((option, index) => {
                  let btnClass = "bg-white text-slate-700 border-slate-200 hover:border-teal-500 hover:bg-teal-50 hover:shadow-md";
                  
                  if (selectedAnswer) {
                    if (option.id === quizQuestions[currentQuizIndex].id) {
                      btnClass = "bg-green-500 text-white border-green-600 shadow-md transform scale-[1.02] z-10";
                    } else if (selectedAnswer.id === option.id) {
                      btnClass = "bg-red-500 text-white border-red-600 opacity-90";
                    } else {
                      btnClass = "bg-slate-50 text-slate-400 border-slate-200 opacity-50";
                    }
                  }

                  return (
                    <button
                      key={index}
                      onClick={() => handleAnswerSelect(option)}
                      disabled={selectedAnswer !== null}
                      className={`p-3 md:p-4 text-left rounded-xl border-2 text-sm md:text-base font-bold transition-all duration-200 flex items-center ${btnClass}`}
                    >
                      <span className="w-6 md:w-8 shrink-0 text-center opacity-60 mr-2 text-base md:text-xl">{index + 1}.</span> 
                      <span className="leading-snug break-keep">{option.vi}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        } else if (quizState === 'result') {
          content = (
            <div className="max-w-md w-full my-auto animate-fade-slide-up">
              <div className="w-28 h-28 md:w-32 md:h-32 bg-yellow-100 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-inner animate-pop-in">
                 <svg xmlns="http://www.w3.org/2000/svg" className="h-14 w-14 md:h-16 md:w-16" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 4.323V3a1 1 0 011-1zm-5 8.274l-.818 2.552c.25.112.526.174.818.174.292 0 .569-.062.818-.174L5 10.274zm10 0l-.818 2.552c.25.112.526.174.818.174.292 0 .569-.062.818-.174L15 10.274z" clipRule="evenodd" />
                </svg>
              </div>
              
              {quizScore === 10 ? (
                <h2 className="text-3xl md:text-4xl font-black text-teal-600 mb-3 break-keep animate-pop-in">
                  🎉 만점 축하합니다! 🎉
                </h2>
              ) : (
                <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-3 break-keep">
                  퀴즈 완료!
                </h2>
              )}

              <p className="text-lg md:text-xl text-slate-600 mb-8 md:mb-10 font-medium break-keep">
                10문제 중 <span className="text-4xl font-black text-teal-600 mx-2">{quizScore}</span>문제를 맞췄습니다.
                {quizScore === 10 && (
                  <span className="block mt-2 text-teal-700 font-bold text-base md:text-lg animate-fade-in-up">
                    현장 용어를 완벽하게 마스터하셨네요! 👍
                  </span>
                )}
              </p>
              
              <div className="flex flex-col gap-3 md:gap-4 w-full">
                {incorrectAnswers.length > 0 && (
                  <button onClick={() => setQuizState('review')} className="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold text-lg rounded-2xl shadow-md transition-colors active:scale-95 break-keep">
                    틀린 문제 확인하기
                  </button>
                )}
                
                <div className="flex gap-3 md:gap-4 w-full">
                  <button onClick={startQuiz} className="flex-1 py-4 bg-teal-600 hover:bg-teal-700 text-white font-bold text-lg rounded-2xl shadow-md transition-colors active:scale-95 break-keep">다시 풀기</button>
                  <button onClick={() => setCurrentView('home')} className="flex-1 py-4 bg-white hover:bg-slate-50 text-slate-700 border-2 border-slate-200 font-bold text-lg rounded-2xl shadow-sm transition-colors active:scale-95 break-keep">처음으로</button>
                </div>
              </div>
            </div>
          );
        } else if (quizState === 'review') {
          content = (
            <div className="max-w-2xl w-full flex flex-col flex-1 min-h-0 h-full animate-fade-slide-up">
              <div className="flex justify-between items-center mb-4 px-2 shrink-0 mt-2">
                <h2 className="text-xl md:text-2xl font-black text-slate-800 text-left flex items-center">
                  <span className="text-rose-500 mr-2 animate-pop-in inline-block text-2xl">💡</span>오답 노트
                </h2>
                <span className="text-sm font-bold bg-rose-100 text-rose-600 px-3 py-1.5 rounded-full shadow-sm border border-rose-200">
                  틀린 문제: {incorrectAnswers.length}개
                </span>
              </div>

              <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-2 space-y-4 mb-4 text-left pb-2">
                {incorrectAnswers.map((item, idx) => (
                  <div key={idx} className="bg-white p-5 md:p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-rose-300 transition-colors group">
                    <div className="flex justify-between items-start">
                      <div className="flex-1">
                        <span className="inline-block px-2.5 py-1 bg-rose-50 text-rose-600 text-xs md:text-sm font-bold rounded-lg mb-3 border border-rose-100">
                          {item.category}
                        </span>
                        <div className="mb-4">
                          <h3 className="text-xl md:text-2xl font-black text-slate-800 tracking-tight break-keep">
                            {item.term}
                          </h3>
                          {item.meaning && (
                            <p className="text-sm md:text-base font-medium text-slate-500 mt-2 break-keep">
                              {item.meaning}
                            </p>
                          )}
                        </div>
                        <div className="bg-slate-50/80 rounded-xl p-4 border border-slate-100/80 group-hover:bg-rose-50/30 transition-colors">
                          <p className="text-base md:text-lg font-bold text-teal-700 mb-2 break-keep">
                            🇻🇳 {item.vi}
                          </p>
                          <p className="text-sm md:text-base font-medium text-slate-500 italic break-keep">
                            🗣️ {item.pron}
                          </p>
                        </div>
                      </div>
                      <button 
                        onClick={() => playAudio(item.term)}
                        className="ml-3 p-4 md:p-5 mt-1 rounded-full bg-slate-50 text-slate-400 hover:bg-rose-500 hover:text-white shadow-sm active:scale-95 transition-all duration-200 border border-slate-200 hover:border-rose-600 shrink-0" 
                        title="한국어 발음 듣기"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 md:h-8 md:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              <div className="shrink-0 flex gap-3 pb-2">
                <button onClick={() => setQuizState('result')} className="flex-1 py-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-base md:text-lg rounded-2xl transition-colors active:scale-95 break-keep">
                  결과화면으로
                </button>
                <button onClick={startQuiz} className="flex-1 py-4 bg-teal-600 hover:bg-teal-700 text-white font-bold text-base md:text-lg rounded-2xl shadow-md transition-colors active:scale-95 break-keep">
                  다시 풀기
                </button>
              </div>
            </div>
          );
        }

        return renderTransitionWrapper(
          <div className="bg-slate-50 rounded-3xl p-4 md:p-8 border border-slate-100 shadow-inner flex flex-col items-center justify-center flex-1 min-h-0 text-center w-full">
            {content}
          </div>
        , `quiz_${quizState}_${activeTab}`);
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-start py-6 md:py-10 px-2 md:px-4">
          <div className="fixed top-0 left-0 w-full h-1.5 md:h-2 bg-gradient-to-r from-blue-700 to-teal-500 shadow-sm z-50"></div>
          
          {/* 헤더 및 뒤로가기 제어 */}
          <div className="w-full max-w-5xl flex justify-between items-center mb-4 md:mb-6 px-2 z-40">
            {currentView !== 'home' ? (
              <button 
                onClick={handleBack} 
                className="bg-white/90 backdrop-blur-sm p-2 md:p-3 pr-4 md:pr-5 rounded-full shadow-sm border border-slate-200 text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition-all flex items-center active:scale-95"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 md:h-6 md:w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                <span className="font-bold text-sm md:text-base">뒤로</span>
              </button>
            ) : <div className="w-20"></div>}

            <h1 className="text-2xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-950 to-blue-700 tracking-tight cursor-pointer break-keep text-center animate-fade-slide-up" onClick={() => setCurrentView('home')}>
              삼호 Yard 한국어
            </h1>
            
            <div className="w-20"></div>
          </div>

          <div className="w-full max-w-5xl relative bg-white/90 backdrop-blur-md shadow-xl shadow-slate-200/50 rounded-3xl md:rounded-[2.5rem] border border-white flex flex-col h-[85vh] md:h-[80vh] overflow-hidden">
            <div className="flex-1 min-h-0 relative p-4 md:p-8">
              {currentView === 'home' && renderHome()}
              
              {currentView === 'learn' && viewStep === 'dept_select' && renderDeptSelect()}
              {currentView === 'learn' && viewStep === 'content' && renderLearnContent()}
              
              {currentView === 'quiz' && viewStep === 'dept_select' && renderDeptSelect()}
              {currentView === 'quiz' && viewStep === 'content' && renderQuizContent()}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
