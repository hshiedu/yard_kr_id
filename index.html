  <!-- Tailwind CSS -->

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    body { 
      font-family: 'Noto Sans KR', sans-serif; 
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      background-color: #f8fafc;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    /* 화면 전환 애니메이션 (더 부드럽고 매끄러운 곡선 적용) */
    @keyframes fadeSlideUp { 
      0% { opacity: 0; transform: translateY(30px); } 
      100% { opacity: 1; transform: translateY(0); } 
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.92); }
      70% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    .animate-fade-slide-up { 
      animation: fadeSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
    }
    .animate-pop-in {
      animation: popIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* 순차적 애니메이션 딜레이 추가 (인트로 연출용) */
    .animate-delay-1 {
      opacity: 0;
      animation: fadeSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }
    .animate-delay-2 {
      opacity: 0;
      animation: fadeSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1.4s forwards;
    }

    /* 타이틀 네온 & 샤인 효과 */
    @keyframes shine {
      to { background-position: 200% center; }
    }
    .neon-title {
      background: linear-gradient(to right, #1e40af, #06b6d4, #3b82f6, #1e40af);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shine 3s linear infinite;
      text-shadow: 0 0 12px rgba(6, 182, 212, 0.3), 0 0 20px rgba(59, 130, 246, 0.15);
    }
  </style>
</head>

          { id: 68, category: '안전/기타', term: '야간 작업 주의해', meaning: '', id_trans: 'Berhati-hatilah saat bekerja di shift malam', pron: 'Ya-gan ja-geop ju-ui-he' },
          { id: 69, category: '안전/기타', term: '구명 조끼 위치 봐', meaning: '', id_trans: 'Lihat di mana lokasi jaket pelampung', pron: 'Gu-myeong jo-kki wi-chi bwa' },
          { id: 70, category: '안전/기타', term: '필요한 서류 챙겨', meaning: '', id_trans: 'Bawa semua dokumen yang diperlukan', pron: 'Pi-ryo-han seo-ryu chaeng-gyeo' },
          { id: 71, category: '안전/기타', term: '선주 정중하게 대해', meaning: '', id_trans: 'Bersikaplah sopan kepada pengawas kapal', pron: 'Seon-ju jeong-jung-ha-ge dae-he' },
          { id: 72, category: '안전/기타', term: '긴급 정지 버튼 눌러', meaning: '', id_trans: 'Tekan tombol Berhenti Darurat', pron: 'Gin-geup jeong-ji beo-teun nul-reo' },
          { id: 73, category: '안전/기타', term: '엔진 온도 체크해', meaning: '', id_trans: 'Cek suhu pada mesin (engine)', pron: 'En-jin on-do che-keu-he' },
          { id: 74, category: '안전/기타', term: '잠시 대기', meaning: '', id_trans: 'Tunggu sebentar (Standby)', pron: 'Jam-si dae-gi' }

      const currentData = learningData[activeTab] || [];

      // --- 퀴즈 상태 관리 ---
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
      const [quizScore, setQuizScore] = useState(0);
      const [quizState, setQuizState] = useState('idle'); // 'idle', 'playing', 'result', 'review'
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isAnswerCorrect, setIsAnswerCorrect] = useState(null);
      const [incorrectAnswers, setIncorrectAnswers] = useState([]); // 오답 저장 배열

      // --- 기능: 네비게이션 제어 ---
      const goToLearn = () => {
        setCurrentView('learn');
        setViewStep('dept_select');
      };

      const goToQuiz = () => {
        setCurrentView('quiz');
        setViewStep('dept_select');
      };

      const handleDeptSelect = (tab) => {
        setActiveTab(tab);
        setViewStep('content');
        if (currentView === 'quiz') setQuizState('idle');
      };

      const handleBack = () => {
        if (viewStep === 'content') {
          setViewStep('dept_select');
          if (currentView === 'quiz') setQuizState('idle');
        } else {
          setCurrentView('home');
        }
      };

      // --- 음성 재생 함수 ---
      const speakText = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ko-KR';
          utterance.rate = 0.8;
          window.speechSynthesis.speak(utterance);
        } else {
          alert(`음성 파일을 찾을 수 없습니다.\n\n'audio' 폴더 안에 '${text}.mp3' 파일이 정확히 있는지 확인해주세요.`);
        }
      };

      // --- MP3 자동 경로 탐색 재생 함수 ---
      const playAudio = (term) => {
        const audioRoot = new Audio(`./${term}.mp3`);
        audioRoot.play().catch(() => {
          const audioFolder = new Audio(`./audio/${term}.mp3`);
          audioFolder.play().catch(() => {
            console.log(`[안내] '${term}.mp3' 파일을 찾을 수 없어 브라우저 기본 음성(TTS)으로 대체합니다.`);
            speakText(term);
          });
        });
      };

      useEffect(() => {
        if (quizState === 'playing' && quizQuestions.length > 0) {
          playAudio(quizQuestions[currentQuizIndex].term);
        }
      }, [currentQuizIndex, quizState, quizQuestions]);

      // 완벽한 랜덤 섞기 함수
      const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      };

      const startQuiz = () => {
        if (currentData.length < 4) {
          alert("단어가 부족합니다 (최소 4개 필요)");
          return;
        }

        const shuffledData = shuffleArray(currentData);
        const selectedQuestions = shuffledData.slice(0, 10);

        const questionsWithOptions = selectedQuestions.map(q => {
          let incorrectOptions = currentData.filter(item => item.id !== q.id);
          incorrectOptions = shuffleArray(incorrectOptions).slice(0, 3);
          const options = shuffleArray([q, ...incorrectOptions]);
          return { ...q, options: options };
        });

        setQuizQuestions(questionsWithOptions);
        setCurrentQuizIndex(0);
        setQuizScore(0);
        setIncorrectAnswers([]); // 시작할 때 오답 배열 초기화
        setQuizState('playing');
        setSelectedAnswer(null);
        setIsAnswerCorrect(null);
      };

      const handleAnswerSelect = (option) => {
        if (selectedAnswer) return;
        setSelectedAnswer(option);
        
        const currentQuestion = quizQuestions[currentQuizIndex];
        const correct = option.id === currentQuestion.id;
        setIsAnswerCorrect(correct);

        if (correct) {
          setQuizScore(prev => prev + 1);
        } else {
          // 오답인 경우 배열에 추가
          setIncorrectAnswers(prev => [...prev, currentQuestion]);
        }

        setTimeout(() => {
          if (currentQuizIndex < quizQuestions.length - 1) {
            setCurrentQuizIndex(prev => prev + 1);
            setSelectedAnswer(null);
            setIsAnswerCorrect(null);
          } else {
            setQuizState('result');
          }

            </button>

      const renderLearnContent = () => renderTransitionWrapper(

                        <div className="mb-3 md:mb-4">

                      <button

                        title="한국어 발음 듣기"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 sm:h-7 sm:w-7 md:h-10 md:w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />

                      </button>

                <div className="text-center py-10 text-slate-400 font-medium flex flex-col items-center justify-center h-full break-keep w-full">
                  <p>해당 부서의 학습 데이터가 아직 준비되지 않았습니다.</p>
                </div>

            </div>
          </div>
        </div>
      , `learn_content_${activeTab}`);

      const renderQuizContent = () => {
        let content;

        if (quizState === 'idle') {
          content = (
            <div className="max-w-md w-full my-auto animate-fade-slide-up px-2">
              <div className="bg-teal-100 text-teal-600 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner text-5xl animate-pop-in">

              </div>
              <h2 className="text-xl sm:text-2xl md:text-3xl font-black text-slate-800 mb-4 break-keep">
                <span className="text-teal-600 mr-1 md:mr-2 whitespace-nowrap">[{activeTab}]</span>
                <span className="whitespace-nowrap">랜덤 퀴즈</span>
                <span className="block text-sm sm:text-base md:text-lg font-bold text-slate-500 mt-2 break-words whitespace-normal">Kuis Acak</span>
              </h2>

                들려주는 한국어 지시어를 듣고,<br/>올바른 뜻을 골라보세요.<br/>
                <span className="text-xs md:text-sm font-normal opacity-80 mt-1 block break-words whitespace-normal w-full">Dengarkan instruksi bahasa Korea dan pilih arti bahasa Indonesia yang benar.</span>

          content = (
            <div className="max-w-2xl w-full flex flex-col flex-1 min-h-0 h-full animate-fade-slide-up">
              <div className="flex justify-between items-center mb-3 md:mb-4 shrink-0 px-2 mt-1 w-full">
                <span className="text-teal-700 font-black text-base md:text-xl tracking-tight">Pertanyaan {currentQuizIndex + 1} / {quizQuestions.length}</span>
                <span className="text-slate-500 font-bold text-sm md:text-lg bg-white px-3 py-1 md:py-1.5 rounded-full shadow-sm border border-slate-200 shrink-0">
                  Skor <span className="text-teal-600 ml-1 text-lg md:text-xl">{quizScore}</span>
                </span>
              </div>

              <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-3 md:mb-4 shrink-0 relative overflow-hidden w-full flex flex-col items-center">
                <div className="absolute top-0 left-0 w-1.5 h-full bg-teal-500"></div>
                <p className="text-xs md:text-sm text-slate-500 font-bold mb-2 md:mb-3 leading-relaxed break-keep text-center w-full">
                  다음 지시어를 듣고 알맞은 의미를 고르시오.<br/>
                  <span className="font-normal opacity-80 break-words whitespace-normal inline-block mt-1">Dengarkan dan pilih arti yang sesuai.</span>
                </p>
                
                <div className="flex flex-col items-center justify-center gap-2 md:gap-3 my-1 w-full">
                  <button 
                    onClick={() => playAudio(quizQuestions[currentQuizIndex].term)}
                    className="w-12 h-12 md:w-16 md:h-16 bg-teal-50 text-teal-600 rounded-full flex items-center justify-center hover:bg-teal-600 hover:text-white shadow-sm hover:shadow-md transition-all transform hover:scale-105 border border-teal-200 shrink-0"
                    title="소리 다시 듣기"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 md:h-8 md:w-8 ml-0.5 md:ml-1" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M8 5v14l11-7z" />
                    </svg>
                  </button>
                  <h3 className="text-lg sm:text-xl md:text-2xl font-black text-slate-800 tracking-tight leading-snug break-words whitespace-normal text-center w-full px-2">
                    {quizQuestions[currentQuizIndex].term}
                  </h3>
                </div>
              </div>

              <div className="flex flex-col gap-2 md:gap-3 flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-2 pb-2 w-full">
                {quizQuestions[currentQuizIndex].options.map((option, index) => {
                  let btnClass = "bg-white text-slate-700 border-slate-200 hover:border-teal-500 hover:bg-teal-50 hover:shadow-md";
                  
                  if (selectedAnswer) {
                    if (option.id === quizQuestions[currentQuizIndex].id) {
                      btnClass = "bg-green-500 text-white border-green-600 shadow-md transform scale-[1.02] z-10";
                    } else if (selectedAnswer.id === option.id) {
                      btnClass = "bg-red-500 text-white border-red-600 opacity-90";
                    } else {
                      btnClass = "bg-slate-50 text-slate-400 border-slate-200 opacity-50";
                    }
                  }

                  return (
                    <button
                      key={index}
                      onClick={() => handleAnswerSelect(option)}
                      disabled={selectedAnswer !== null}
                      className={`p-3 md:p-4 text-left rounded-xl border-2 text-sm md:text-lg font-bold transition-all duration-200 flex items-center w-full ${btnClass}`}
                    >
                      <span className="w-6 md:w-8 shrink-0 text-center opacity-60 mr-2 text-base md:text-xl">{index + 1}.</span> 
                      <span className="leading-snug break-words whitespace-normal w-full text-sm sm:text-base md:text-lg">{option.id_trans}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        } else if (quizState === 'result') {
          content = (
            <div className="max-w-md w-full my-auto px-2 text-center overflow-y-auto custom-scrollbar py-4">
              <div className="w-28 h-28 md:w-32 md:h-32 bg-yellow-100 text-yellow-500 rounded-full flex items-center justify-center mx-auto mb-6 md:mb-8 shadow-inner animate-pop-in shrink-0">
                 <svg xmlns="http://www.w3.org/2000/svg" className="h-14 w-14 md:h-16 md:w-16" viewBox="0 0 20 20" fill="currentColor">
                  <path fillRule="evenodd" d="M10 2a1 1 0 011 1v1.323l3.954 1.582 1.599-.8a1 1 0 01.894 1.79l-1.233.616 1.738 5.42a1 1 0 01-.285 1.05A3.989 3.989 0 0115 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.715-5.349L11 6.477V16h2a1 1 0 110 2H7a1 1 0 110-2h2V6.477L6.237 7.582l1.715 5.349a1 1 0 01-.285 1.05A3.989 3.989 0 015 15a3.989 3.989 0 01-2.667-1.019 1 1 0 01-.285-1.05l1.738-5.42-1.233-.617a1 1 0 01.894-1.788l1.599.799L9 4.323V3a1 1 0 011-1zm-5 8.274l-.818 2.552c.25.112.526.174.818.174.292 0 .569-.062.818-.174L5 10.274zm10 0l-.818 2.552c.25.112.526.174.818.174.292 0 .569-.062.818-.174L15 10.274z" clipRule="evenodd" />
                </svg>
              </div>
              
              {quizScore === 10 ? (
                <h2 className="text-3xl md:text-4xl font-black text-teal-600 mb-3 break-keep animate-pop-in">
                  🎉 만점 축하합니다! 🎉
                  <span className="block text-lg font-bold text-teal-600/80 mt-2 break-words whitespace-normal">Selamat, Anda mendapat nilai sempurna!</span>
                </h2>
              ) : (
                <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-3 break-keep">
                  퀴즈 완료!
                  <span className="block text-lg font-bold text-slate-500 mt-2 break-words whitespace-normal">Selesai!</span>
                </h2>
              )}

              <p className="text-lg md:text-xl text-slate-600 mb-8 md:mb-10 font-medium break-keep">
                10문제 중 <span className="text-4xl font-black text-teal-600 mx-2">{quizScore}</span>문제를 맞췄습니다.
                {quizScore === 10 && (
                  <span className="block mt-2 text-teal-700 font-bold text-base md:text-lg animate-fade-in-up break-words whitespace-normal">
                    현장 문장을 완벽하게 마스터하셨네요! 👍
                  </span>
                )}
              </p>
              
              <div className="flex flex-col gap-3 md:gap-4 w-full shrink-0">
                {incorrectAnswers.length > 0 && (
                  <button onClick={() => setQuizState('review')} className="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold text-lg rounded-2xl shadow-md transition-colors active:scale-95 break-keep">
                    틀린 문제 확인하기
                    <span className="block text-sm font-normal opacity-90 mt-0.5 break-words whitespace-normal">Lihat Jawaban Salah</span>
                  </button>
                )}
                
                <div className="flex gap-3 md:gap-4 w-full">
                  <button onClick={startQuiz} className="flex-1 py-3 md:py-4 bg-teal-600 hover:bg-teal-700 text-white font-bold text-base md:text-lg rounded-2xl shadow-md transition-colors active:scale-95 break-keep">
                    다시 풀기<span className="block text-xs md:text-sm font-normal opacity-90 mt-0.5 break-words whitespace-normal">Coba Lagi</span>
                  </button>
                  <button onClick={() => setCurrentView('home')} className="flex-1 py-3 md:py-4 bg-white hover:bg-slate-50 text-slate-700 border-2 border-slate-200 font-bold text-base md:text-lg rounded-2xl shadow-sm transition-colors active:scale-95 break-keep">
                    처음으로<span className="block text-xs md:text-sm font-normal opacity-70 mt-0.5 break-words whitespace-normal">Ke Beranda</span>
                  </button>
                </div>
              </div>
            </div>
          );
        } else if (quizState === 'review') {
          content = (
            <div className="max-w-2xl w-full flex flex-col flex-1 min-h-0">
              <div className="flex justify-between items-center mb-4 px-2 shrink-0 mt-2 w-full">
                <h2 className="text-lg sm:text-xl md:text-2xl font-black text-slate-800 text-left flex items-center break-keep">
                  <span className="text-rose-500 mr-1 md:mr-2 animate-pop-in inline-block text-xl sm:text-2xl">💡</span>
                  <div className="flex flex-col">
                    <span className="whitespace-nowrap">오답 노트</span>
                    <span className="text-xs sm:text-sm font-bold text-slate-400 break-words whitespace-normal">Catatan Jawaban Salah</span>
                  </div>
                </h2>
                <span className="text-[11px] sm:text-xs md:text-sm font-bold bg-rose-100 text-rose-600 px-2 sm:px-3 py-1.5 rounded-full shadow-sm border border-rose-200 text-center shrink-0">
                  틀린 문제: {incorrectAnswers.length}개<br/>
                  <span className="opacity-80 scale-90 inline-block break-words whitespace-normal">Jumlah jawaban salah: {incorrectAnswers.length}</span>
                </span>
              </div>

              <div className="flex-1 min-h-0 overflow-y-auto custom-scrollbar pr-2 space-y-4 mb-4 text-left pb-2 w-full">
                {incorrectAnswers.map((item, idx) => (
                  <div key={idx} className="bg-white p-4 md:p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-rose-300 transition-colors group w-full">
                    <div className="flex justify-between items-start w-full">
                      <div className="flex-1 min-w-0">
                        <span className="inline-block px-2.5 py-1 bg-rose-50 text-rose-600 text-[11px] md:text-sm font-bold rounded-lg mb-2 border border-rose-100 break-keep">
                          {item.category}
                        </span>
                        <div className="mb-3 md:mb-4 w-full">
                          <h3 className="text-lg sm:text-xl md:text-2xl font-black text-slate-800 tracking-tight break-keep w-full">
                            {item.term}
                          </h3>
                          {item.meaning && (
                            <p className="text-xs sm:text-sm md:text-base font-medium text-slate-500 mt-1 break-keep w-full">
                              {item.meaning}
                            </p>
                          )}
                        </div>
                        <div className="bg-slate-50/80 rounded-xl p-3 md:p-4 border border-slate-100/80 group-hover:bg-rose-50/30 transition-colors w-full">
                          <p className="text-sm sm:text-base md:text-lg font-bold text-teal-700 mb-1.5 break-words whitespace-normal w-full">
                            🇮🇩 {item.id_trans}
                          </p>
                          <p className="text-xs sm:text-sm md:text-base font-medium text-slate-500 italic break-words whitespace-normal w-full">
                            🗣️ {item.pron}
                          </p>
                        </div>
                      </div>
                      <button 
                        onClick={() => playAudio(item.term)}
                        className="shrink-0 ml-3 p-3 md:p-5 mt-1 rounded-full bg-slate-50 text-slate-400 hover:bg-rose-500 hover:text-white shadow-sm active:scale-95 transition-all duration-200 border border-slate-200 hover:border-rose-600 flex items-center justify-center" 
                        title="한국어 발음 듣기"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 sm:h-7 sm:w-7 md:h-8 md:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                          <path strokeLinecap="round" strokeLinejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              <div className="shrink-0 flex gap-3 pb-2 w-full">
                <button onClick={() => setQuizState('result')} className="flex-1 py-3 md:py-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold text-sm md:text-base rounded-2xl transition-colors active:scale-95 break-keep">
                  결과화면으로<br/><span className="font-normal opacity-80 text-xs break-words whitespace-normal mt-0.5 inline-block">Kembali ke Hasil</span>
                </button>
                <button onClick={startQuiz} className="flex-1 py-3 md:py-4 bg-teal-600 hover:bg-teal-700 text-white font-bold text-sm md:text-base rounded-2xl shadow-md transition-colors active:scale-95 break-keep">
                  다시 풀기<br/><span className="font-normal opacity-80 text-xs break-words whitespace-normal mt-0.5 inline-block">Coba Lagi</span>
                </button>
              </div>
            </div>
          );
        }

        return renderTransitionWrapper(
          <div className="flex flex-col flex-1 min-h-0 w-full max-w-5xl mx-auto">
            {renderTabSelector('bg-teal-600')}
            <div className="bg-slate-50 rounded-3xl p-4 md:p-8 border border-slate-100 shadow-inner flex flex-col items-center justify-center flex-1 min-h-0 text-center w-full">
              {content}
            </div>
          </div>
        , `quiz_${quizState}_${activeTab}`);
      };

      return (
        <div 
          className="min-h-[100dvh] flex flex-col items-center justify-start py-4 md:py-10 px-2 md:px-4 bg-slate-50 w-full"
          style={{ fontFamily: "'HD체', 'Hyundai Sans', sans-serif" }}
        >
          <div className="fixed top-0 left-0 w-full h-1.5 md:h-2 bg-gradient-to-r from-blue-700 to-teal-500 shadow-sm z-50"></div>
          
          {/* 헤더 및 뒤로가기 제어 */}
          {currentView !== 'home' && (
            <div className="w-full max-w-5xl flex justify-between items-center mb-3 md:mb-6 px-2 z-40 mt-1 md:mt-0 shrink-0">
              <button 
                onClick={handleBack} 
                className="bg-white/90 backdrop-blur-sm p-2 md:p-3 pr-3 md:pr-5 rounded-full shadow-sm border border-slate-200 text-slate-500 hover:text-blue-600 hover:bg-blue-50 transition-all flex items-center active:scale-95 shrink-0"
              >
                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 md:h-6 md:w-6 mr-1 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                <div className="flex flex-col items-start leading-none gap-0.5 shrink-0">
                  <span className="font-bold text-xs md:text-base whitespace-nowrap">뒤로</span>
                  <span className="font-normal text-[9px] md:text-xs opacity-70 whitespace-nowrap">Kembali</span>
                </div>
              </button>

              <div className="flex flex-col items-center justify-center w-full cursor-pointer animate-fade-slide-up group" onClick={() => setCurrentView('home')}>
                <h1 className="text-xl sm:text-2xl md:text-3xl font-black tracking-tight break-keep text-center leading-tight transition-transform duration-300 group-hover:scale-105 flex items-center justify-center">
                  <span className="neon-title pb-1">삼호 Yard 한국어</span>
                </h1>
                <div className="h-1 w-16 sm:w-24 bg-gradient-to-r from-blue-600 to-teal-400 rounded-full mt-0.5 opacity-80 shadow-[0_0_10px_rgba(45,212,191,0.6)] group-hover:w-28 transition-all duration-300"></div>
              </div>
              
              <div className="w-16 md:w-20 shrink-0"></div>
            </div>
          )}

          <div className={`w-full max-w-5xl relative bg-white/90 backdrop-blur-md shadow-xl shadow-slate-200/50 rounded-2xl md:rounded-[2.5rem] border border-white flex flex-col flex-1 min-h-0 overflow-hidden ${currentView === 'home' ? 'bg-transparent shadow-none border-none' : 'max-h-[90dvh] md:max-h-[85vh] mt-2 md:mt-0'}`}>
            <div className={`flex-1 min-h-0 relative flex flex-col w-full ${currentView === 'home' ? 'p-0' : 'p-3 sm:p-4 md:p-8'}`}>
              {currentView === 'home' && renderHome()}
              
              {currentView === 'learn' && viewStep === 'dept_select' && renderDeptSelect()}
              {currentView === 'learn' && viewStep === 'content' && renderLearnContent()}
              
              {currentView === 'quiz' && viewStep === 'dept_select' && renderDeptSelect()}
              {currentView === 'quiz' && viewStep === 'content' && renderQuizContent()}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
